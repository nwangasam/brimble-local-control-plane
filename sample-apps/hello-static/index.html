<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Static</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", sans-serif;
        color: #17191b;
        background: #fbfaf7;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(720px, calc(100% - 48px));
        padding: 40px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 18px;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from a static sample</h1>
      <p>This sample is intentionally plain and content-led so uploads can be tested with a low-complexity page.</p>
    </main>
  </body>
</html>
